apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  namespace: nonprod
  labels:
    app: devops-app
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # never bring a pod down first
      maxSurge: 1          # spin up 1 extra pod during update
  template:
    metadata:
      labels:
        app: devops-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8080"
    spec:
      # Use a dedicated ServiceAccount (not default)
      serviceAccountName: devops-app-sa

      containers:
      - name: devops-app
        image: ghcr.io/chandanvura/devops-app:latest   # replace
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http

        # Environment from ConfigMap and Secret
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: devops-app-config
              key: APP_ENV
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: devops-app-config
              key: APP_VERSION

        # Resource requests and limits — required for HPA
        resources:
          requests:
            memory: "256Mi"
            cpu:    "100m"
          limits:
            memory: "512Mi"
            cpu:    "500m"

        # Readiness probe — pod only gets traffic when this passes
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3

        # Liveness probe — restart pod if it becomes unresponsive
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15
          failureThreshold: 3

      # Topology spread — distribute pods across nodes
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: devops-app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-app-sa
  namespace: nonprod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-app-config
  namespace: nonprod
data:
  APP_ENV:     "nonprod"
  APP_VERSION: "1.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: devops-app-svc
  namespace: nonprod
  labels:
    app: devops-app
spec:
  selector:
    app: devops-app
  ports:
  - name: http
    port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-app-hpa
  namespace: nonprod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
