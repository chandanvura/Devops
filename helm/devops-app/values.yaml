# Default values — override per environment via values-nonprod.yaml / values-prod.yaml

replicaCount: 1

image:
  repository: ghcr.io/chandanvura/devops-app
  pullPolicy: Always
  tag: "latest"

env:
  APP_ENV:     "local"
  APP_VERSION: "1.0.0"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 40
  periodSeconds: 15

# Prometheus monitoring
serviceMonitor:
  enabled: true
  path: /actuator/prometheus
  interval: 15s
