# Production — HA replicas, larger resources, HPA enabled
replicaCount: 3

env:
  APP_ENV:     "prod"
  APP_VERSION: "1.0.0"

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
