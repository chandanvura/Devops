name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devops-app

jobs:
  # ─── Job 1: Build and Test ────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -f app/pom.xml

      - name: Run unit tests
        run: mvn test -f app/pom.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/target/surefire-reports/

  # ─── Job 2: Security Scan ────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './app'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'        # set to '1' to fail on CVEs
          format: 'table'

  # ─── Job 3: Docker Build and Push ────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-test, security-scan]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write 

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Deploy to NonProd ────────────────────────────────
  deploy-nonprod:
    name: Deploy → NonProd
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: nonprod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to NonProd with Helm
        run: |
          echo "Deploying ${{ needs.docker-build-push.outputs.short-sha }} to nonprod..."
          # helm upgrade --install devops-app ./helm/devops-app \
          #   --namespace nonprod --create-namespace \
          #   --set image.tag=${{ needs.docker-build-push.outputs.short-sha }} \
          #   --values ./helm/devops-app/values-nonprod.yaml \
          #   --wait
          echo "Deploy command above — uncomment when K8s cluster is configured"

  # ─── Job 5: Deploy to Production (main only) ─────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-nonprod
    if: github.ref == 'refs/heads/main'
    environment:
      name: production        # requires manual approval in GitHub Environments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production with Helm
        run: |
          echo "Deploying ${{ needs.docker-build-push.outputs.short-sha }} to PRODUCTION..."
          # helm upgrade --install devops-app ./helm/devops-app \
          #   --namespace prod --create-namespace \
          #   --set image.tag=${{ needs.docker-build-push.outputs.short-sha }} \
          #   --values ./helm/devops-app/values-prod.yaml \
          #   --wait
          echo "Deploy command above — uncomment when K8s cluster is configured"
