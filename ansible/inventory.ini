# inventory.ini — list of servers Ansible manages
# Usage: ansible-playbook -i inventory.ini setup-server.yml

[app_servers]
# Replace with your actual server IPs or hostnames
192.168.1.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
192.168.1.11 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[app_servers:vars]
ansible_python_interpreter=/usr/bin/python3

# For local testing (run against localhost)
[local]
localhost ansible_connection=local
